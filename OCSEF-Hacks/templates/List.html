<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Needy Nibbles - Expiration List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/main.css">
    <script>
        // Apply dark mode immediately to prevent flash
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>
</head>
<body> 
    <div class="expiration-page">

    <div class="list-section">
        <div class="list-header">
            <a href="index.html">
                <img src="/images/Needy Nibbles Logo (Transparent) (1) (2).png" class="menu-logo" alt="Logo">
            </a>
            <h2 class="list-title">Expiration List</h2>
        </div>
        
        <div id="food-list-container" class="food-list">
            <div class="food-item">Loading items...</div>
        </div>
    </div>

    <div class="notification-section">
        <h2 class="list-title notification-title">Notifications</h2>
        <div id="notif-container" class="notif-list">
           
        </div>
    </div>
</div>

    <script src="/static/main.js" defer></script>
</body>
</html>
